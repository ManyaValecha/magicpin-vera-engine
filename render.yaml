services:
  - type: web
    name: vera-growth-engine
    env: python
    region: singapore
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
